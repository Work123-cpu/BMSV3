name: BookMyShow Ticket Monitor

on:
  repository_dispatch:
    types: [run-monitor] # Triggered by cron-job.org
  workflow_dispatch:      # Kept for manual testing

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests curl_cffi beautifulsoup4
      - name: Run Check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python monitor.py
